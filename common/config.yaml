project_name: xxx Project Name

env: Test Environment
# Tester name, used as the author in auto-generated code and as the test lead for WeCom and DingTalk notifications
tester_name: Xin Wen

# Domain 1
host: https://www.wanandroid.com
# Domain 2, supports multiple domain configurations
app_host:

# Real-time update of test case content; when set to False, already-generated code will not be changed
# When set to True, modifying test cases in yaml files will cause the code to update in real time
real_time_update_test_cases: False

# Report notification type: 0: no notification  1: DingTalk  2: WeCom notification  3: Email notification  4: Lark notification
notification_type: 0
# Switch for collecting failed test cases, organized into an Excel report and sent automatically; currently only supports WeCom notifications
excel_report: False

# Note:
# Previously, to avoid affecting teammates when they pulled and ran the code, the WeCom, DingTalk, and email notification configs were all set to mine
# I noticed that many people who pulled the code never changed this config, so all notifications were being sent to me~~ Please update the relevant config if you see this

