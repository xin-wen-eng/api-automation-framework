# common parameters
case_common:
  allureEpic: Developer Platform Interface
  allureFeature: Collect Module
  allureStory: Collect URL Interface

collect_addtool_01:
    host: ${{host()}}
    url: /lg/collect/addtool/json
    method: POST
    detail: Add Collect URL Interface
    headers:
      # The value of cookie here is the name stored in cache
      cookie: $cache{login_cookie}
    # Request data type: params, json, file, or data
    requestType: data
    # Whether to execute; empty or true will both execute
    is_run:
    data:
      name: Automation
      link: https://gitee.com/yu_xiao_qi/pytest-auto-api2

    dependence_case: False
    # Dependent data
    dependence_case_data:
    assert:
      # Assert interface status code
      errorCode:
        jsonpath: $.errorCode
        type: ==
        value: 0
        AssertType:
        message: "errorCode assertion is 0"

    current_request_set_cache:
      - type: response
        jsonpath: $.data.id
        # Custom cache name
        name: yushaoqi_sql
    sql:
    teardown:
      - case_id: collect_delete_tool_01
        send_request:
          - dependent_type: response
            jsonpath: $.data.id
            replace_key: $.data.id

    teardown_sql:
      - UPDATE `api_test`.`ysq_test` SET `name` = '$json($.data.id)$' WHERE `name` = '2' LIMIT 1

collect_addtool_02:
    host: ${{host()}}
    url: /lg/collect/addtool/json
    method: POST
    detail: Add Collect URL While Not Logged In
    headers:
      Content-Type: multipart/form-data;
      # The value of cookie here is the name stored in cache
    # Request data type: params, json, file, or data
    requestType: data
    # Whether to execute; empty or true will both execute
    is_run:
    data:

      name: Auto-generated collect URL${{random_int()}}
      link: https://gitee.com/yu_xiao_qi/pytest-auto-api2
    # Whether there is a dependent business; empty or false means no dependency
    dependence_case: False
    # Dependent data
    dependence_case_data:
    assert:
      status_code: 200
      # Assert interface status code
      errorCode:
      # Assert interface status code
        jsonpath: $.errorCode
        type: ==
        value: -1001
        AssertType:
      errorMsg:
        jsonpath: $.errorMsg
        type: ==
        value: 'Please log in first!'
        AssertType:
    sql:
