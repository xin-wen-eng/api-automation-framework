# Common parameters
case_common:
  allureEpic: Developer Platform API
  allureFeature: Favorites Module
  allureStory: Edit Favorite URL Interface

collect_update_tool_01:
    host: ${{host()}}
    url: /lg/collect/addtool/json
    method: POST
    detail: Edit favorite URL
    headers:
      Content-Type: multipart/form-data;
      # The value of cookie here is the name stored in cache
      cookie: $cache{login_cookie}
    # Request data type: params, json, file, or data
    requestType: data
    # Whether to execute; empty or true will both execute
    is_run: False
    data:
      name: Automation edit URL name
      link: https://gitee.com/yu_xiao_qi/pytest-auto-api2
      id:
    # Whether there are dependent cases; empty or false means none
    dependence_case: True
    # Dependent data
    dependence_case_data:
      - case_id: collect_addtool_01
        dependent_data:
          - dependent_type: response
            jsonpath: $.data.id
            replace_key: $.data.id
    assert:
      # Assert interface status code
      errorCode:
        jsonpath: $.errorCode
        type: ==
        value: 0
        AssertType:
    sql:
    teardown:

      # Search first
      - case_id: collect_tool_list_01
        param_prepare:
          - dependent_type: self_response
            jsonpath: $.data[-1:].id
            set_cache: $set_cache{artile_id}

      # Delete
      - case_id: collect_delete_tool_01
        send_request:
          # Delete: get data from cache
          - dependent_type: cache
            cache_data: int:artile_id
            replace_key: $.data.id
