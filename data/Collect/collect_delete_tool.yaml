# common parameters
case_common:
  allureEpic: Development Platform API
  allureFeature: Favorites Module
  allureStory: Delete Favorite Website API

collect_delete_tool_01:
    host: ${{host()}}
    url: /lg/collect/deletetool/json
    method: POST
    detail: Normal deletion of a favorite website
    headers:
      Content-Type: multipart/form-data;
      # The cookie value here refers to the name stored in cache
      cookie: $cache{login_cookie}
    # Request data type: params, json, file, or data
    requestType: data
    # Whether to execute; empty or true means it will execute
    is_run:
    data:
      id: $cache{collect_delete_tool_01_id}
      id2: 2
    dependence_case: True
    # Dependent data
    dependence_case_data:
      - case_id: collect_addtool_01
        dependent_data:
          - dependent_type: response
            jsonpath: $.data.id
            set_cache: collect_delete_tool_01_id

    assert:
      # Assert API status code
      errorCode:
        jsonpath: $.errorCode
        type: ==
        value: 0
        AssertType:
    sql:


collect_delete_tool_02:
    host: ${{host()}}
    url: /lg/collect/deletetool/json
    method: POST
    detail: Normal deletion of a non-existent ID (API does not support this feature yet, skip this test case)
    headers:
      Content-Type: multipart/form-data;
      # The cookie value here refers to the name stored in cache
      cookie: $cache{login_cookie}
    # Request data type: params, json, file, or data
    requestType: data
    # Whether to execute; empty or true means it will execute
    is_run: False
    data:
      id: 111
      # Whether there is a dependent business; empty or false means none
    dependence_case: True
    # Dependent data
    dependence_case_data:
      - case_id: collect_addtool_01
        dependent_data:
          - dependent_type: response
            jsonpath: $.data.id
            replace_key: $.data.id
    assert:
      # Assert API status code
      errorCode:
        jsonpath: $.errorCode
        type: ==
        value: 0
        AssertType:
    sql:
