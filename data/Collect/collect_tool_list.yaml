# Common parameters
case_common:
  allureEpic: Development Platform Interface
  allureFeature: Collect Module
  allureStory: Collect URL List Interface

collect_tool_list_01:
    host: ${{host()}}
    url: /lg/collect/usertools/json
    method: GET
    detail: View collect URL list interface
    headers:
      Content-Type: multipart/form-data;
      # The cookie value here is the name stored in cache
      cookie: $cache{login_cookie}
    # Request data type: params, json, file, or data
    requestType: None
    # Whether to execute; empty or true will both execute
    is_run:
    data:
    # Whether there are dependent business cases; empty or false means no dependency
    dependence_case: True
        # Dependent data
    dependence_case_data:
      - case_id: self
        dependent_data:
          - dependent_type: sqlData
            jsonpath: $.business_type
            set_cache: yushaoqi

    assert:
      # Assert interface status code
      errorCode:
        jsonpath: $.errorCode
        type: ==
        value: 0
        AssertType:
      status_code: 200
    sql:
    setup_sql:
      - SELECT * FROM `api_test`.`t_open_field_cfg_copy1` LIMIT 0,1;
    sleep: 2
