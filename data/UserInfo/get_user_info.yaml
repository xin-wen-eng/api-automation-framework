# common parameters
case_common:
  allureEpic: Development Platform API
  allureFeature: Personal Information Module
  allureStory: Personal Information API

get_user_info_01:
    host: ${{host()}}
    url: /user/lg/userinfo/json
    method: GET
    detail: Normal retrieval of personal identity information
    headers:
      Content-Type: multipart/form-data;
      # The cookie value here is the name stored in the cache
      cookie: $cache{login_cookie}
    # Request data type: params, json, file, or data
    requestType: data
    # Whether to execute; empty or true will both execute
    is_run:
    data:
      # Whether there are dependent business cases; empty or false means none
    dependence_case: False
        # Dependent data
    dependence_case_data:
    assert:
      # Assert the API status code
      errorCode:
        jsonpath: $.errorCode
        type: ==
        value: 0
        AssertType:
      # Assert the username returned by the API
      username:
        jsonpath: $.data.userInfo.username
        type: ==
        value: '18800000001'
        AssertType:
    sql:
