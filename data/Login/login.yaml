# Common parameters
case_common:
  allureEpic: Development Platform API
  allureFeature: Login Module
  allureStory: Login

login_01:
    host: ${{host()}}
    url: /user/login
    method: POST
    detail: Normal login
    headers:
#      Content-Type: multipart/form-data;
    # Request data type: params, json, file, or data
    requestType: data
    # Whether to execute; empty or true means it will execute
    is_run:
    data:
      username: '18800000001'
      password: '123456'
      # Whether there are dependent cases; empty or false means none
    dependence_case: False
        # Dependent data
    dependence_case_data:
    assert:
      # Assert interface status code
      errorCode:
        jsonpath: $.errorCode
        type: ==
        value: 0
        AssertType:
      # Assert interface returned username
      username:
        jsonpath: $.data.username
        type: ==
        value: '18800000001'
        AssertType:
    sql:

